spring:
  application:
    name: student-service

  mvc:
    problemdetails:
      enabled: true

  datasource:               # ← directly under spring, not under mvc
    url: jdbc:postgresql://localhost:12500/eca
    username: postgres
    password: psql
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

servlet:
  multipart:
    enabled: true
    max-file-size: 5MB
    max-request-size: 10MB

server:
  port: 8000
  forward-headers-strategy: framework

eureka:
  instance:
    instanceId: ${spring.application.name}:${vcap.application.instance_id:${spring.application.instance_id:${random.value}}}



app:
  storage:
    path: ${user.home}/.ijse/eca/students



